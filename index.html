<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary: #d481a2; /* Благородный Rose Gold */
  --primary-hover: #bc6c8d;
  --text: #2d0a1a;
  --bg-gradient: radial-gradient(circle at top right, #fff5f8, #fdf2f5 50%, #f9e8ef 100%);
  --glass: rgba(255, 255, 255, 0.65);
  --glass-border: rgba(255, 255, 255, 0.5);
}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: 'Montserrat', sans-serif;
  background: var(--bg-gradient);
  overflow: hidden;
  perspective: 1000px;
  -webkit-tap-highlight-color: transparent;
}
/* Живой анимированный фон */
.bg-blobs {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1;
  filter: blur(100px);
  opacity: 0.6;
}
.blob {
  position: absolute;
  border-radius: 50%;
  animation: move 20s infinite alternate;
}
.blob1 { width: 450px; height: 450px; background: #ffe4e9; top: -10%; left: -5%; }
.blob2 { width: 550px; height: 550px; background: #fce1e4; bottom: -10%; right: -5%; animation-duration: 25s; }
.blob3 { width: 350px; height: 350px; background: #f9d8e2; top: 30%; left: 20%; animation-duration: 18s; }

@keyframes move {
  from { transform: translate(0, 0) rotate(0deg); }
  to { transform: translate(100px, 50px) rotate(360deg); }
}

.card{
  background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.4));
  padding: 40px 25px;
  border-radius: 40px;
  text-align:center;
  width: min(420px, 88vw);
  box-shadow: 0 40px 80px -12px rgba(212, 129, 162, 0.15), 
              inset 0 0 0 1px rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(30px) saturate(160%);
  -webkit-backdrop-filter: blur(30px) saturate(160%);
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.1s ease-out;
  animation: fadeIn 1s cubic-bezier(0.22, 1, 0.36, 1), cardBreath 4s ease-in-out infinite 1s;
}
.logo{
  width:130px;
  height:130px;
  border-radius:50%;
  object-fit:cover;
  border: 5px solid #fff;
  box-shadow: 0 15px 35px rgba(212, 129, 162, 0.2);
  margin-bottom: 20px;
  transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  animation: scaleIn 0.8s 0.2s both;
}
.logo:hover{transform:scale(1.1) rotate(5deg)}

.sub{
  margin: 0 0 35px;
  color: var(--text);
  font-weight: 400;
  line-height: 1.6;
  font-size: 15px;
  letter-spacing: 0.2px;
  animation: fadeIn 0.8s 0.4s both;
}
.sub b{ color: var(--primary); font-weight: 700; letter-spacing: 0.8px; }

.btn{
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 12px 0;
  padding: 20px 20px;
  border-radius: 22px;
  border:none;
  font-weight: 600;
  font-size: 15px;
  text-decoration: none;
  cursor:pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  animation: fadeIn 0.8s both;
}
.btn:nth-child(1) { animation-delay: 0.6s; }
.btn:nth-child(2) { animation-delay: 0.7s; }

.btn i{ margin-right: 12px; font-size: 18px; }

.btn:hover{
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 15px 30px rgba(212, 129, 162, 0.2);
}
.btn:active {
  transform: translateY(-1px) scale(0.98);
  transition: 0.1s;
}
/* Эффект блика */
.btn::after {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
  transform: rotate(45deg);
  animation: shimmer 3s infinite cubic-bezier(0.4, 0, 0.2, 1);
}
@keyframes shimmer {
  0% { left: -120%; opacity: 0; }
  20% { opacity: 1; }
  40%, 100% { left: 120%; opacity: 0; }
}

.whatsapp{
  background: linear-gradient(135deg, #25D366, #128C7E);
  color:#fff;
}
.instagram{
  background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  color:#fff;
}

.heart{
  position:absolute;
  font-size:20px;
  opacity:.3;
  animation: floatUp 8s linear infinite;
  pointer-events:none;
  filter: blur(0.5px);
}
@keyframes floatUp{
  from{ transform: translateY(30px); }
  to{ transform: translateY(-120vh); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes cardBreath {
  0%, 100% { transform: translateY(0) scale(1); box-shadow: 0 40px 80px -12px rgba(212, 129, 162, 0.15); }
  50% { transform: translateY(-5px) scale(1.01); box-shadow: 0 50px 100px -10px rgba(212, 129, 162, 0.25); }
}

/* Адаптивность под мобильные устройства */
@media (max-width: 480px) {
  .card {
    padding: 30px 20px;
    border-radius: 30px;
  }
  .logo {
    width: 110px;
    height: 110px;
  }
  .sub {
    font-size: 14px;
    margin-bottom: 25px;
  }
  .blob1 { width: 300px; height: 300px; }
  .blob2 { width: 350px; height: 350px; }
}
</style>
</head>
<body>

  <div class="blob blob3"></div>
</div>

<div class="card">
  <!-- Лого -->
  <img class="logo" src="logo.jpeg" alt="Лого LUMERA NAILS">

  
  <div class="sub">
    <b>МАНИКЮР / НАРАЩИВАНИЕ / СЕМЕЙ</b><br><br>

    • гель покрытие / укрепление / дизайн<br>

  </div>

  <div class="buttons">
    <a class="btn whatsapp" href="https://wa.me/+77787680058" target="_blank">
      <i class="fa-brands fa-whatsapp"></i> WhatsApp

    <a class="btn instagram" href="https://instagram.com/nails.lumera_semey" target="_blank">

    </a>
  </div>
</div>

<script>
/* Эффект наклона карточки */
const card = document.querySelector('.card');

const handleMove = (e) => {
  const x = e.type.includes('touch') ? e.touches[0].pageX : e.pageX;
  const y = e.type.includes('touch') ? e.touches[0].pageY : e.pageY;
  
  const xAxis = (window.innerWidth / 2 - x) / 20;
  const yAxis = (window.innerHeight / 2 - y) / 20;
  card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
};

document.addEventListener('mousemove', handleMove);
document.addEventListener('touchmove', handleMove, { passive: true });

/* Сброс наклона при уходе мыши */
const resetTilt = () => card.style.transform = `rotateY(0deg) rotateX(0deg)`;
document.addEventListener('mouseleave', resetTilt);
document.addEventListener('touchend', resetTilt);

/* Фоновые элементы */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.textContent=["✨","🌸","💎","🩷","🤍"][Math.random()*5|0];
  h.style.left=Math.random()*100+"vw";
  h.style.top="100vh";
  h.style.animationDuration=(6+Math.random()*6)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),12000);
},600);
</script>

</body>
